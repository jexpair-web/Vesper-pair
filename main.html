<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vesper-Xmd Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background-image: url("https://files.catbox.moe/xd8cvb.jpg");
      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
    }

    /* Overlay for better readability */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      max-width: 450px;
    }

    /* Logo container */
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #1a6fd4;
      padding: 5px;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 30px rgba(26, 111, 212, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .logo-img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(26, 111, 212, 0.7);
    }

    .brand-name {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-top: 12px;
      text-shadow: 0 0 20px rgba(26, 111, 212, 0.5);
      letter-spacing: 2px;
    }

    .brand-sub {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      letter-spacing: 4px;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 30px;
    }

    .btn {
      --color: #e5f5f1;
      --color2: #000000;
      width: 100%;
      padding: 0.9em 1.75em;
      background: linear-gradient(135deg, #1a6fd4 0%, #0e4a8a 100%);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
      font-weight: 600;
      font-size: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: 1.5px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn::after {
      content: '';
      display: block;
      height: 100%;
      width: 100%;
      transform: skew(90deg) translate(-50%, -50%);
      position: absolute;
      inset: 50%;
      left: 25%;
      z-index: -1;
      transition: 0.5s ease-out;
      background: #ffffff;
    }

    .btn:hover::after {
      transform: skew(45deg) translate(-50%, -50%);
    }

    .btn:hover {
      color: #0e4a8a;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(26, 111, 212, 0.4);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-icon {
      font-size: 20px;
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .logo-img { width: 80px; height: 80px; }
      .brand-name { font-size: 22px; }
      .btn { font-size: 14px; padding: 0.8em 1.5em; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <img class="logo-img" src="https://files.catbox.moe/xd8cvb.jpg" alt="Vesper Logo" onerror="this.style.display='none'">
      <div class="brand-name">VESPER-XMD</div>
      <div class="brand-sub">Session Generator</div>
    </div>

    <div class="btn-group">
      <button onclick="window.open(`/pair`)" class="btn">
        <span class="btn-icon">🔑</span> Pair Code
      </button>
      <button onclick="window.open(`/qr`)" class="btn">
        <span class="btn-icon">📱</span> QR Scan
      </button>
      <button onclick="window.open(`https://github.com/Kevintech-hub/Vesper-Xmd/fork`)" class="btn">
        <span class="btn-icon">⭐</span> Fork Repository
      </button>
    </div>

    <div class="footer">© 2024 JexploitDev</div>
  </div>

</body>
</html>
